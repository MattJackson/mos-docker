# Phase 3 — patched + Apple identity (SMC + apple-kbd/tablet).
# Prereq: mos-docker-phase2:latest must exist.
services:
  macos-phase-3:
    build:
      context: .
      dockerfile: Dockerfile.phase3
    image: mos-docker-phase3:latest
    container_name: mos-docker-phase-3
    privileged: true
    network_mode: host
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    restart: "no"
    volumes:
      - ./volumes/disk.img:/image
      - ./volumes/opencore.img:/opt/macos/OpenCore.img:ro
      - ./volumes/recovery.img:/opt/macos/recovery.img:ro
      - ./logs:/data/logs
      - ./run:/data/run
    environment:
      - LOG_DIR=/data/logs
      - RUN_DIR=/data/run
      - NOVNC_PORT=6083
      - VNC_PORT=5903
      - SSH_PORT=22223
      - RAM=8
      - SMP=4
      - CORES=4
      - IMAGE_PATH=/image
      - OPENCORE_IMG=/opt/macos/OpenCore.img
      - DISK_SIZE=256G
