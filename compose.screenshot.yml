# Removable screenshot capture overlay.
# Production: do NOT include this file. Phase compose runs alone.
# Test:       include alongside the phase compose:
#   PHASE=N docker compose -f compose.phaseN.yml -f compose.screenshot.yml up -d
#
# Adds a sidecar (mos-docker-screenshot-${PHASE}) that captures the noVNC
# viewport ~75s after boot and writes
# /data/run/phase-${PHASE}-current.png. The laptop-side
# scripts/capture-screenshot.sh syncs that PNG back via scp.
services:
  screenshot:
    build:
      context: .
      dockerfile: Dockerfile.screenshot
    image: mos-docker-screenshot:latest
    container_name: mos-docker-screenshot-${PHASE:-0}
    restart: "no"
    network_mode: host
    environment:
      - PHASE=${PHASE:-0}
      - NOVNC_URL=http://127.0.0.1:608${PHASE:-0}/vnc.html?autoconnect=1
      - OUTPUT_PATH=/data/run/phase-${PHASE:-0}-current.png
      - BOOT_WAIT_SECS=75
    volumes:
      - ./run:/data/run
    labels:
      - "mos.role=screenshot-capture"
      - "mos.phase=${PHASE:-0}"
