# mos-docker — test compose service (phase 4 interactive M5 dev only).
#
# As of 2026-05-10, the test/production image split was dropped — there's
# now ONE image (mos-docker:latest) containing patched + OEM QEMU + test
# scripts + screenshot tools. Phases 0-3 don't need this compose file at
# all; `./mos test 0..3` calls scripts/test-runner.sh directly via
# `docker run`. This file exists only for `./mos test 4` (interactive M5
# dev stack — apple-gfx-pci paravirt with no auto pass/fail since Stage
# 20% gate has no gold yet).

services:
  test:
    image: mos-docker:latest
    build: .
    # tini as PID 1: QEMU's exit (clean OR via KVM-kernel SIGSEGV) is reaped
    # deterministically. Without this, when phase 4's `exec qemu` makes QEMU
    # itself PID 1, an abnormal exit can leave dockerd's task-state machine
    # out of sync with containerd, producing a "Up" zombie that no `docker
    # rm -f` will clear (only daemon restart will).
    init: true
    privileged: true
    network_mode: host
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    mem_limit: ${MEM_LIMIT:-24g}        # ceiling = guest -m + ~50% for QEMU host-side
    cpus: '${CPU_LIMIT:-32}'            # ceiling = guest -smp + iothread/qmp headroom (matches prod)
    volumes:
      - ./data:/data
      - ./baselines:/baselines
    entrypoint: ["/scripts/entrypoint.sh", "test"]
    tty: true
    stdin_open: true
    environment:
      # Test guest defaults match production (compose.yml macos service):
      # 16 vCPUs / 16 GB. Previous 8/8 default produced ~2x slower boot
      # which combined with the 300s BOOT_TIMEOUT pushed phase 1/2/3 verifies
      # to flake-rate; 16/16 boots in the calibrated 138-153s window.
      - RAM=${RAM:-16}
      # SMP/CORES/THREADS must satisfy SMP = sockets * cores * threads.
      # iMac20,1 = 8C/16T → cores=8, threads=2, sockets=1, total=16 vCPUs.
      # Bumping SMP requires bumping CORES (or THREADS) in lockstep.
      - SMP=${SMP:-16}
      - CORES=${CORES:-8}
      - THREADS=${THREADS:-2}
      # Default phase-4 dev runs to info-level libapplegfx logging so
      # /tmp/lagfx.log shows the doorbell/dispatcher data flow without
      # the per-MMIO TRACE flood. Override with LAGFX_LOG_LEVEL=trace
      # (loud) or LAGFX_LOG_LEVEL=warn (silent except warnings/errors).
      - LAGFX_LOG_LEVEL=${LAGFX_LOG_LEVEL:-info}
      # Stage 65d Option 3 — substitute triangle SPVs for every shader reference
      # so a non-black pixel can land before real metallib capture (deferred,
      # rides off-FIFO Mach IPC). Files are baked into mos-qemu-patched by
      # qemu-mos15@88c2222 (Dockerfile.patched LAYER B1).
      - LAGFX_TRIANGLE_VERTEX_SPV=${LAGFX_TRIANGLE_VERTEX_SPV:-/usr/share/lagfx/triangle_vertex.spv}
      - LAGFX_TRIANGLE_FRAGMENT_SPV=${LAGFX_TRIANGLE_FRAGMENT_SPV:-/usr/share/lagfx/triangle_fragment.spv}
      # Vulkan validation layers — opt-in for Stage 80 debugging (perf cost).
      # Set LAGFX_VK_VALIDATION=1 to capture VUIDs during boot.
      - LAGFX_VK_VALIDATION=${LAGFX_VK_VALIDATION:-""}
      # Phase B step 4 (2026-05-18) — heap-slot bytes-fetch diagnostic.
      # When set, op_0x74 reads heap[+reference*12] via shell.read_memory
      # and logs the parsed slot fields. Hard cap of 20 dumps total.
      # See memory/phase_a_scenario_a_2026_05_18.md + paravirt-re/library/phase_b_*.
      - LAGFX_PHASE_B_DUMP=${LAGFX_PHASE_B_DUMP:-""}
      - LAGFX_PHASE_B_SWEEP=${LAGFX_PHASE_B_SWEEP:-""}
      - LAGFX_PHASE_B_LOOKUP=${LAGFX_PHASE_B_LOOKUP:-""}
      # Phase C step 1 (2026-05-19) — metallib bytes capture to disk.
      # When set, op_0x74 captures vertex+fragment metallibs via shell.read_memory
      # and writes them to /tmp/lagfx-metallibs/ with size in filename.
      # Hard cap of 20 total unique captures (vert + frag combined).
      - LAGFX_PHASE_C_CAPTURE=${LAGFX_PHASE_C_CAPTURE:-""}
