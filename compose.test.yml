# mos-docker — regression test stack.
#
# Used by `./mos test <phase>` and CI. Builds + runs the test image which
# extends production with OEM QEMU binary + screenshot capture tools.
#
# Run a single phase:
#   docker compose -f compose.test.yml run --rm test 0
#   docker compose -f compose.test.yml run --rm test 1
#   ...
#
# All test runs share /data with production (the disk image is the same).

services:
  test:
    image: mos-docker:test
    build:
      context: .
      dockerfile: Dockerfile.test
    # tini as PID 1: QEMU's exit (clean OR via KVM-kernel SIGSEGV) is reaped
    # deterministically. Without this, when phase 4's `exec qemu` makes QEMU
    # itself PID 1, an abnormal exit can leave dockerd's task-state machine
    # out of sync with containerd, producing a "Up" zombie that no `docker
    # rm -f` will clear (only daemon restart will).
    init: true
    privileged: true
    network_mode: host
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    mem_limit: ${MEM_LIMIT:-20g}        # ceiling = guest -m + ~25% for QEMU host-side
    cpus: '${CPU_LIMIT:-20}'            # ceiling = guest -smp + iothread/qmp headroom
    volumes:
      - ./data:/data
      - ./baselines:/baselines
    entrypoint: ["/scripts/entrypoint.sh", "test"]
    tty: true
    stdin_open: true
    environment:
      - RAM=${RAM:-8}
      - SMP=${SMP:-8}
      - CORES=${CORES:-8}
