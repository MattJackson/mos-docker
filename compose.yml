# mos-docker — production stack.
#
# Runs an installed macOS VM. Persistent state in ./data/ on the host.
#
# First time:   docker compose run --rm install
# Steady state: docker compose up -d
# Logs:         docker compose logs -f
# Stop:         docker compose down
#
# noVNC: macOS exposes VNC at 127.0.0.1:5900 inside the container; in
# production you typically front-end it with your existing reverse proxy +
# noVNC web service. For local-only access uncomment the bundled-noVNC port.

services:
  install:
    image: mos-docker:latest
    build: .
    profiles: ["install"]               # only runs when explicitly invoked
    command: ["install"]
    privileged: true                    # /dev/kvm + macvtap when HOST_IFACE set
    network_mode: host
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    mem_limit: ${MEM_LIMIT:-24g}        # ceiling = guest -m + ~50% for QEMU host-side (matches compose.test.yml)
    cpus: '${CPU_LIMIT:-32}'            # ceiling = guest -smp + iothread/qmp headroom (matches compose.test.yml)
    volumes:
      - ./data:/data
    tty: true
    stdin_open: true                    # interactive — let user see install progress
    environment:
      - DISK_SIZE=${DISK_SIZE:-256G}
      - RAM=${RAM:-8}
      - SMP=${SMP:-16}
      - CORES=${CORES:-8}
      - MOS_QEMU_BUNDLED_NOVNC=1        # install needs noVNC for the user

  macos:
    image: mos-docker:latest
    build: .
    command: ["run"]
    # NO restart policy. The only way mos containers come up is via `./mos`
    # explicitly. `restart: unless-stopped` here previously caused dockerd
    # to auto-restart this service after every host reboot AND silently
    # restart-loop a crashing container indefinitely (observed
    # restartCount=120+ across 2 hours after a host reboot, masquerading
    # as resource contention for unrelated test runs). Operator launches
    # via `./mos run` / `./mos test N` / `./mos verify N`; if it crashes
    # we want the crash visible, not papered over by silent restart.
    privileged: true
    network_mode: host
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    mem_limit: ${MEM_LIMIT:-24g}        # ceiling = guest -m + ~50% for QEMU host-side (matches compose.test.yml)
    cpus: '${CPU_LIMIT:-32}'            # ceiling = guest -smp + iothread/qmp headroom (matches compose.test.yml)
    volumes:
      - ./data:/data
      # Mount /tmp to persist lagfx.log across container restarts
      # Logs are written here by device.c and captured via docker logs
      - ./data/logs:/tmp
    environment:
      - HOST_IFACE=${HOST_IFACE:-}        # empty = user-mode networking; set for macvtap
      - RAM=${RAM:-16}
      - SMP=${SMP:-16}
      - CORES=${CORES:-8}
      - GPU_CORES=${GPU_CORES:-8}
      - LAGFX_LOG_LEVEL=${LAGFX_LOG_LEVEL:-trace}      # debug by default for M5 troubleshooting
      - MOS_QEMU_BUNDLED_NOVNC=${MOS_QEMU_BUNDLED_NOVNC:-1}
      # Stage 65d Option 3 — triangle SPVs are baked into mos-qemu-patched at
      # /usr/share/lagfx/triangle_*.spv (qemu-mos15 Dockerfile.patched LAYER B1).
      # Override at run time with the env vars below if testing a different
      # bundle. Earlier versions of this file also set hardcoded
      # `LAGFX_TRIANGLE_*_SPV=/data/...` lines above these — compose's
      # "last-key-wins" hid the bug for ~5h on 2026-05-17 (no /data/triangle_*
      # files ever existed). Single source of truth is now the env-fallback.
      - LAGFX_TRIANGLE_VERTEX_SPV=${LAGFX_TRIANGLE_VERTEX_SPV:-/usr/share/lagfx/triangle_vertex.spv}
      - LAGFX_TRIANGLE_FRAGMENT_SPV=${LAGFX_TRIANGLE_FRAGMENT_SPV:-/usr/share/lagfx/triangle_fragment.spv}
      # Phase 6a: opt-in to the per-function AIR -> SPIR-V translator
      # in op_0x74. With this unset the kext continues to receive the
      # bundled substitute triangle shaders (Stage 75 safety net). Set
      # to 1 to route real metallib bytes through translate_module and
      # hand the resulting SPIR-V to vkCreateShaderModule. On any
      # translation failure for a given pipeline ref, the substitute
      # is used for that ref. See memory/escalations_to_senior.md
      # ENTRY-007 for the descriptor-decoder caveats (Phase 6b).
      - LAGFX_PHASE6_TRANSLATE=${LAGFX_PHASE6_TRANSLATE:-0}
      # Phase 6b reconnaissance — hex-dump 0x24/0x25 payloads to
      # lagfx.log (8-capture cap). See paravirt-re/library/apv-object-
      # entry-parser-scoping-2026-05-17.md.
      - LAGFX_PHASE_B2_CAPTURE=${LAGFX_PHASE_B2_CAPTURE:-0}
      # - MOS_USE_APPLE_GFX_PCI=1    # disabled - memfd_alloc(0) bug
      # MOS_PERSIST: 1 = writes hit disk.img (default behavior for production
      # users who want their state to survive). 0 = snapshot=on, ephemeral
      # writes (safer for development; default in scripts/run.sh).
      # compose.yml defaults to 1 to match the "I'm running production" intent.
      - MOS_PERSIST=${MOS_PERSIST:-1}
