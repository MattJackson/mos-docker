# Production = Phase 4 of the layered regression chain.
# This file is for production runs. Phased regression tests use
# compose.phase{0..4}.yml.
#
# First-time setup (after clone, after every push that changes the chain):
#   scripts/build-phases.sh         # builds base → phase0 → ... → phase4
#
# Production run:
#   docker compose up -d
#
# Phased test runs (separate from production):
#   docker compose -f compose.phase0.yml up -d   # vanilla VNC test
#   docker compose -f compose.phase1.yml up -d   # OpenCore-only
#   ...
services:
  macos:
    image: mos-docker-phase4:latest
    container_name: mos-docker-macos-1
    restart: unless-stopped
    privileged: true                     # required for /dev/kvm + macvtap
    network_mode: host
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    environment:
      - HOST_IFACE=${HOST_IFACE:-}
      - LOG_DIR=/data/logs
      - RUN_DIR=/data/run
      - NOVNC_PORT=6080
      - VNC_PORT=5900
      - SSH_PORT=22220
      - RAM=16
      - SMP=16
      - CORES=16
      - DISK_SIZE=256G
      - VGAMEM_MB=512
      - GPU_CORES=${GPU_CORES:-8}
      - LAGFX_LOG_LEVEL=${LAGFX_LOG_LEVEL:-warn}
      - LAGFX_STAMP_SLOT=${LAGFX_STAMP_SLOT:-0}
      - LAGFX_IRQ_VECTOR=${LAGFX_IRQ_VECTOR:-0}
      - LAGFX_STAMP_VALUE=${LAGFX_STAMP_VALUE:-}
      - IMAGE_PATH=/image
    volumes:
      - ./volumes/disk.img:/image
      - ./volumes/recovery.img:/opt/macos/recovery.img:ro
      - ./volumes/opencore.img:/opt/macos/OpenCore.img:ro
      - ./logs:/data/logs
      - ./run:/data/run
