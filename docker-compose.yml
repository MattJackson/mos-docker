services:
  macos:
    build: .
    restart: unless-stopped
    privileged: true
    environment:
      - IMAGE_PATH=/image
      - HOST_IFACE=eth0        # your host's physical network interface
      - RAM=16                 # install: 24, running: 16
      - SMP=16                 # install: 24, running: 8
      - CORES=16               # install: 24, running: 8
      - DISK_SIZE=256G
      - VGAMEM_MB=512          # framebuffer VRAM (256 sufficient for 5K, 512 free headroom)
    volumes:
      - ./mac_hdd_ng.img:/image
    network_mode: host

  novnc:
    image: geek1011/easy-novnc
    restart: unless-stopped
    command: --addr :6080 --host 127.0.0.1 --port 5901 --no-url-password
    network_mode: host
    depends_on:
      - macos
