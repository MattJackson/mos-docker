services:
  macos:
    build: .
    restart: unless-stopped
    privileged: true                       # required for /dev/kvm + macvtap
    environment:
      - IMAGE_PATH=/image                  # path inside the container; bind-mount below maps it to host
      - HOST_IFACE=eth0                    # CHANGE ME — your host network interface (find with `ip addr show`)
      - RAM=16                             # GB. Install needs 24 minimum; steady-state 16 is comfortable
      - SMP=16                             # vCPU sockets/threads
      - CORES=16                           # vCPU cores per socket
      - DISK_SIZE=256G                     # Created on first launch if mac_hdd_ng.img is empty
      - VGAMEM_MB=512                      # VMware SVGA framebuffer VRAM. Device-side max is 512 MB; higher requests are silently capped.
      # GPU_CORES — per-VM lavapipe worker-thread budget for the apple-gfx-pci display path.
      #   0 (default)  : unset; lavapipe picks host core count.
      #   1..64        : pin lavapipe's LP_NUM_THREADS to this value via
      #                  `-device apple-gfx-pci,gpu_cores=N`.
      #   Examples: GPU_CORES=4 (low-end), GPU_CORES=8 (sweet spot, ~30fps @1080p),
      #             GPU_CORES=16 (headroom).
      #   Non-numeric / negative values are rejected by launch.sh (falls back to unset).
      #   Measured scaling curve: mos/memory/project_tunable_gpu_cores.md
      #   Device-side docs:      docs/qemu-mos15-build.md#tuning-gpu_cores-on-the-apple-gfx-pci-device
      - GPU_CORES=${GPU_CORES:-0}
    volumes:
      - ./mac_hdd_ng.img:/image            # The macOS install/runtime disk. Touch this file empty to trigger install mode.
      - ./launch.sh:/opt/macos/launch.sh:ro  # Source-of-truth launch.sh from this repo; lets env vars actually apply
    network_mode: host                     # macvtap bridge needs host networking

  novnc:
    image: geek1011/easy-novnc
    restart: unless-stopped
    command: --addr :6080 --host 127.0.0.1 --port 5901 --no-url-password
    network_mode: host
    depends_on:
      - macos
