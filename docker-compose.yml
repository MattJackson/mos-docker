services:
  macos:
    build: .
    restart: unless-stopped
    privileged: true                       # required for /dev/kvm + macvtap
    environment:
      - IMAGE_PATH=/image                  # in-container path for the macOS disk (bind-mounted below)
      # HOST_IFACE: if unset, launch.sh auto-detects the first UP non-virtual
      # NIC (skipping lo, docker0, br-*, veth*, macvtap*, virbr*, tailscale*).
      # Set this explicitly only on multi-NIC hosts where the default pick
      # isn't the right one. Find candidates with `ip -br link show`.
      - HOST_IFACE=${HOST_IFACE:-}
      - RAM=16                             # GB. Install needs 24 minimum; steady-state 16 is comfortable.
                                           # Guest RAM is wired via -object memory-backend-memfd,share=on
                                           # (see launch.sh). Required for the apple-gfx-pci paravirt GPU to
                                           # alias guest pages into the host library's task VA. See
                                           # libapplegfx-vulkan/docs/memory-coherence-audit.md.
      - SMP=16                             # vCPU sockets/threads
      - CORES=16                           # vCPU cores per socket
      - DISK_SIZE=256G                     # Created on first launch if volumes/disk.img is empty
      - VGAMEM_MB=512                      # VMware SVGA framebuffer VRAM. Device-side max is 512 MB; higher requests are silently capped.
      # GPU_CORES -- per-VM lavapipe worker-thread budget for the apple-gfx-pci display path.
      #   0 (default)  : unset; lavapipe picks host core count.
      #   1..64        : pin lavapipe's LP_NUM_THREADS to this value via
      #                  `-device apple-gfx-pci,gpu_cores=N`.
      #   Examples: GPU_CORES=4 (low-end), GPU_CORES=8 (sweet spot, ~30fps @1080p),
      #             GPU_CORES=16 (headroom).
      #   Non-numeric / negative values are rejected by launch.sh (falls back to unset).
      #   Measured scaling curve: mos/memory/project_tunable_gpu_cores.md
      #   Device-side docs:      docs/qemu-mos15-build.md#tuning-gpu_cores-on-the-apple-gfx-pci-device
      - GPU_CORES=${GPU_CORES:-0}
      - LOG_DIR=/data/logs                 # Where launch.sh writes per-boot serial logs. Host path: ./logs/
      - RUN_DIR=/data/run                  # Where launch.sh binds the HMP + QMP unix sockets. Host path: ./run/
    volumes:
      # Per-deployment artifacts staged by ./setup.sh into ./volumes/. See
      # volumes/README.md for how to produce each one and expected sizes.
      - ./volumes/disk.img:/image                            # macOS install/runtime disk (empty = install mode)
      - ./volumes/recovery.img:/opt/macos/recovery.img:ro    # Apple recovery image, ~3 GB
      - ./volumes/opencore.img:/opt/macos/OpenCore.img:ro    # Bootable EFI image from build-mos15-img.sh
      - ./logs:/data/logs                                    # Per-boot serial logs (serial-YYYYMMDD-HHMMSS.log)
      - ./run:/data/run                                      # QEMU HMP + QMP unix sockets
    network_mode: host                     # macvtap bridge needs host networking

  novnc:
    image: geek1011/easy-novnc
    restart: unless-stopped
    command: --addr :6080 --host 127.0.0.1 --port 5901 --no-url-password
    network_mode: host
    depends_on:
      - macos
