# mos-docker — ensure /mnt/docker has correct group ownership
#
# Created: 2026-05-17
# Context: Senior fixed /mnt/docker permission reset post-reboot with `chgrp docker`
# Discovery showed no boot-time mechanism resets perms, but this rule makes the intent
# explicit and provides automatic repair if ownership is accidentally changed.
d /mnt/docker 0750 root docker -
